      <!-- #region Test Individual Pages -->
      <div class="testPage tests-questions-custom-intro page hidden">
        <p>Custom Test</p>
        <p>Enter the starting question number:</p>
        <input class="test-search-bar" placeholder="Enter">
        <p>Enter the ending question number:</p>
        <input class="test-search-bar" placeholder="Enter">
        <button class="test-start-button" onclick="
          let min = parseInt(document.querySelector('.tests-questions-custom-intro input:nth-of-type(1)').value);
          let max = parseInt(document.querySelector('.tests-questions-custom-intro input:nth-of-type(2)').value);
          if (isNaN(min) || isNaN(max) || min < 1 || max > functionArray.length || min > max) {
            alert('Please enter valid question numbers between 1 and ' + functionArray.length);
            return;
          }
          testMakerCustom(min, max);
          ">Start
        </button>
      </div>
      <div class="testPage tests-questions-custom page hidden">
        <p class="custom-test-title">Custom Test</p>
        <div class="test-generator-container questions-custom-generator-container"></div>
        <input class="test-search-bar questions-custom-search-bar" placeholder="Enter">
        <button class="test-start-button questions-custom-start-button"
          >Start
        </button>
        <button class="back" onclick="
          if (document.querySelector('.questions-custom-start-button').textContent === 'Stop') {
            document.querySelector('.questions-custom-start-button').click();
          }
          togglePage('tests-questions-custom-intro');
          ">Back
        </button>
      </div>
