<!DOCTYPE html>
<html>
  <head>
    <title>NS Practice</title>

    <link rel="stylesheet" href="ns-practice-styles.css">
  </head>
  <body>
    <div class="left-panel">
      <button class="left-panel-button" onclick="
        togglePage('rp-welcome-page');
        ">Home
      </button>
      <button class="left-panel-button" onclick="
        togglePage('rp-skills-page');
        ">Skills
      </button>
      <button class="left-panel-button" onclick="
        togglePage('rp-tricks-page');
        ">Tricks
      </button>
    </div>
    <div class="right-panel">
      <!-- #region Broad Container Pages -->
      <div class="rp-welcome-page page">
        <p>Welcome</p>
      </div>
      <div class="rp-skills-page page hidden">
        <p class="rp-skills-title">
          Skills
        </p>
        <div class="rp-skills-buttons">
          <div class="rp-skills-buttons-leftColumn">
            <button class="rp-skills-buttons-style" onclick="togglePage('skills-fractionSimpl')">
              Fraction Simplification
            </button>
          </div>
          <div class="rp-skills-buttons-rightColumn">
            <button class="rp-skills-buttons-style">
              None
            </button>
          </div>
        </div>
      </div>
      <div class="rp-tricks-page page hidden">
        <p class="rp-tricks-title">
          Tricks
        </p>
        <div class="rp-tricks-buttons">
          <div class="rp-tricks-buttons-leftColumn">
            <button class="rp-tricks-buttons-style" onclick="togglePage('tricks-cubicRootABC')">
              Cubic Root ([a+b][b+c][c+a])
            </button>
          </div>
          <div class="rp-tricks-buttons-rightColumn">
            <button class="rp-tricks-buttons-style">
              button2
            </button>
          </div>
        </div>
      </div>
      <!-- #endregion -->

      <!-- #region Skills Individual Pages-->
      <div class="skills-fractionSimpl page hidden">
        <p>Fraction Simplification</p>
        <div class="fractionSimpl-generator-container">
          <math>
            <mfrac class="fractionSimpl-frac">
              <mn class="fractionSimpl-ftop"></mn>
              <mi class="fractionSimpl-fbottom"></mi>
            </mfrac>
          </math>
        </div>
        <input class="fractionSimpl-search-bar" placeholder="Enter">
        <button class="fractionSimpl-start-button" onclick="
          swapStartStop('fractionSimpl-start-button');
          fractionSimplifying();
          ">Start
        </button>
        <p>Current Time</p>
        <p>Prev Time</p>
      </div>
      <!-- #endregion -->

      <!-- #region Tricks Individual Pages-->
      <div class="tricks-cubicRootABC page hidden">
        <p>Cubic Root ([a+b][b+c][c+a])</p>
        <div class="cubicRootABC-generator-container"></div>
        <input class="cubicRootABC-search-bar" placeholder="Enter">
        <button class="cubicRootABC-start-button" onclick="
          swapStartStop('cubicRootABC-start-button');
          cubicRootABC();
          ">Start
        </button>
      </div>
      <!-- #endregion -->
    </div>


    <script src="ns-practice-layout.js"></script>
    <script src="ns-practice-skills.js"></script>
    <script src="ns-practice-tricks.js"></script>
  </body>
</html>
