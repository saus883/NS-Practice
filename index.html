<!DOCTYPE html>
<html>
  <head>
    <title>NS Practice</title>

    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/14.8.1/math.js"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">

    <script>
      math.config({
        number: 'BigNumber',
        precision: 20,
      });
    </script>
  </head>
  <body>
    <div class="sidebar">
      <button class="sidebar-button" onclick="
        togglePage('welcome-page');
        ">Home
      </button>
      <button class="sidebar-button" onclick="
        togglePage('practice-page');
        ">Practice
      </button>
      <button class="sidebar-button" onclick="
        togglePage('test-page');
        ">Test
      </button>
    </div>
    <div class="content-container">
      <!-- #region Broad Container Pages -->
      <div id="welcome-page" class="page active">
        <p class="rp-title">Welcome</p>
        <p class="website-information">
          New Additions:<br>
          - new color and styling<br>
          - combined skills and tricks into practice<br>
          - search bar in practice<br>
          - some new stuff in practice<br>
          - added skip button to test<br>
        </p>
      </div>
      <div id="practice-page" class="page">
        <input id="search-bar" class="search" type="search" placeholder="Search">
        <p class="rp-title">Practice</p>
        <div class="rp-buttons-container">
          <button class="rp-button" onclick="togglePracticePage('fractionSimplifying', 'Simplifying Fractions')">
            Simplifying Fractions
          </button>
          <button class="rp-button" onclick="togglePracticePage('decimalToFraction', 'Convert Decimal -> Fraction')">
            Convert Decimal -> Fraction
          </button>
          <button class="rp-button" onclick="togglePracticePage('squaresCubes', 'Squares and Cubes')">
            Squares and Cubes
          </button>
          <button class="rp-button" onclick="togglePracticePage('addSubtractNumbers', 'Adding/Subtracting Numbers')">
            Adding/Subtracting Numbers
          </button>
          <button class="rp-button" onclick="togglePracticePage('cubicRootABC', 'Sum of Cubic Roots ([a+b][b+c][c+a])', 'cubicRootABC_explanation')">
            Sum of Cubic Roots ([a+b][b+c][c+a])
          </button>
          <button class="rp-button" onclick="togglePracticePage('doubleIntegralAddSubtract', 'Add/Subtract Double Integral', 'doubleIntegralAddSubtract_explanation')">
            Add/Subtract Double Integrals
          </button>
          <button class="rp-button" onclick="togglePracticePage('determinant3x3', 'Determinant of 3x3 Matrix', 'determinant3x3_explanation')">
            Determinant of 3x3 Matrix
          </button>
          <button class="rp-button" onclick="togglePracticePage('convertingBases', 'Converting Bases')">
            Converting Bases
          </button>
          <button class="rp-button" onclick="togglePracticePage('dividingBases', 'Finding Remainder When Dividing Bases')">
            Finding Remainder When Dividing Bases
          </button>
          <button class="rp-button" onclick="togglePracticePage('den90fraction', 'Fractions with denominators of 99, 999, 90, 990, or 900')">
            Fractions with denominators of 99, 999, 90, 990, or 900
          </button>
          <button class="rp-button" onclick="togglePracticePage('multiplication3x2', '3 by 2 Multiplication')">
            3 by 2 Multiplication
          </button>
          <button class="rp-button" onclick="togglePracticePage('estimateMultiplicationAndDivision', 'Multiplication and Division Estimation')">
            Multiplication and Division Estimation
          </button>
        </div>
      </div>
      <div id="test-page" class="page">
        <p class="rp-title">Test</p>
        <div class="rp-buttons-container">
          <button class="rp-button" onclick="togglePage('test-questions-intro-page')">
            Custom Test
          </button>
        </div>
        
      </div>
      <!-- #endregion -->

      

      <!-- #region Practice Individual Page-->
      <div id="practice-individual-page" class="individual-page page">
        <p id="practice-title" data-question="" class="title"></p>
        <div id="practice-problem-container" class="problem-container"></div>
        <input id="practice-input" class="input" placeholder="Enter">
        <button id="practice-start-button" class="start-button" onclick="
          swapStartStop('practice-start-button');
          let practiceName = document.getElementById('practice-title').getAttribute('data-question');
          practiceMaker(practiceName);
          ">Start
        </button>
        <p id="question-explanation" class="explanation"></p>
      </div>
      <!-- #endregion -->
      
      <!-- #region Test Individual Page -->
      <div id="test-questions-intro-page" class="individual-page page">
        <p>Custom Test</p>
        <p>Enter the starting question number:</p>
        <input id="test-starting-number" class="input" placeholder="Enter">
        <p>Enter the ending question number:</p>
        <input id="test-ending-number" class="input" placeholder="Enter">
        <button class="start-button" onclick="
          let min = parseInt(document.getElementById('test-starting-number').value);
          let max = parseInt(document.getElementById('test-ending-number').value);
          if (isNaN(min) || isNaN(max) || min < 1 || max > functionArray.length || min > max) {
            alert('Please enter valid question numbers between 1 and ' + functionArray.length);
            return;
          }
          testMakerCustom(min, max);
          ">Start
        </button>
      </div>
      <div id="test-questions-page" class="individual-page page">
        <p id="test-title" class="title">Custom Test</p>
        <div id="test-problem-container" class="problem-container"></div>
        <input id="test-input" class="input" placeholder="Enter">
        <div id="test-start-and-skip" class="start-and-skip-container">
          <button id="test-start-button" class="start-button">
            Start
          </button>
          <button id="test-skip-button" class="skip-button">
            Skip
          </button>
        </div>
        <button id="test-back" class="back" onclick="
          if (document.getElementById('test-start-button').textContent === 'Stop') {
            document.getElementById('test-start-button').click();
          }
          togglePage('test-questions-intro-page');
          ">Back
        </button>
      </div>
      <!-- #endregion -->
    </div>


    
    <script src="layout.js"></script>
    <script src="helper.js"></script>
    <script src="practice.js"></script>
    <script src="test.js"></script>
  </body>
</html>
