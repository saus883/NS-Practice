<!DOCTYPE html>
<html>
  <head>
    <title>NS Practice</title>

    <link rel="stylesheet" href="ns-practice-styles.css">
  </head>
  <body>
    <div class="left-panel">
      <button class="left-panel-button" onclick="
        togglePage('rp-welcome-page');
        ">Home
      </button>
      <button class="left-panel-button" onclick="
        togglePage('rp-skills-page');
        ">Skills
      </button>
      <button class="left-panel-button" onclick="
        togglePage('rp-tricks-page');
        ">Tricks
      </button>
      <button class="left-panel-button" onclick="
        togglePage('rp-test-page');
        ">Test
      </button>
    </div>
    <div class="right-panel">
      <!-- #region Broad Container Pages -->
      <div class="rp-welcome-page page">
        <p>Welcome</p>
      </div>
      <div class="rp-skills-page page hidden">
        <p class="rp-skills-title">
          Skills
        </p>
        <div class="rp-skills-buttons">
          <div class="rp-skills-buttons-leftColumn">
            <button class="rp-skills-buttons-style" onclick="togglePage('skills-fractionSimpl')">
              Fraction Simplification
            </button>
            <button class="rp-skills-buttons-style" onclick="togglePage('skills-decimalToFraction')">
              Decimal to Fraction
            </button>
          </div>
          <div class="rp-skills-buttons-rightColumn">
            <button class="rp-skills-buttons-style" onclick="togglePage('skills-squaresCubes')">
              Squares and Cubes
            </button>
          </div>
        </div>
      </div>
      <div class="rp-tricks-page page hidden">
        <p class="rp-tricks-title">
          Tricks
        </p>
        <div class="rp-tricks-buttons">
          <div class="rp-tricks-buttons-leftColumn">
            <button class="rp-tricks-buttons-style" onclick="togglePage('tricks-cubicRootABC')">
              Cubic Root ([a+b][b+c][c+a])
            </button>
            <button class="rp-tricks-buttons-style" onclick="togglePage('tricks-doubleIntegralAddSubtract')">
              Double Integral Add/Subtract
            </button>
          </div>
          <div class="rp-tricks-buttons-rightColumn">
            <button class="rp-tricks-buttons-style" onclick="togglePage('tricks-determinant3x3')">
              Determinant of 3x3 Matrix
            </button>
          </div>
        </div>
      </div>
      <div class="rp-test-page page hidden">
        <p class="rp-test-title">Test</p>
        <div class="rp-test-buttons">
          <div class="rp-test-buttons-leftColumn">
            <button class="rp-test-buttons-style" onclick="togglePage('tests-questions-1-10')">
              Questions 1-10
            </button>
          </div>
          <div class="rp-test-buttons-rightColumn">
            <button class="rp-test-buttons-style" onclick="">
              Questions 11-20
            </button>
          </div>
        </div>
        
      </div>
      <!-- #endregion -->


      <!-- #region Skills Individual Pages-->
      <div class="skillPage skills-fractionSimpl page hidden">
        <p>Fraction Simplification</p>
        <div class="skill-generator-container fractionSimpl-generator-container">
          <math>
            <mfrac class="fractionSimpl-frac">
              <mn class="fractionSimpl-ftop"></mn>
              <mi class="fractionSimpl-fbottom"></mi>
            </mfrac>
          </math>
        </div>
        <input class="skill-search-bar fractionSimpl-search-bar" placeholder="Enter">
        <button class="skill-start-button fractionSimpl-start-button" onclick="
          swapStartStop('fractionSimpl-start-button');
          fractionSimplifying();
          ">Start
        </button>
      </div>
      <div class="skillPage skills-squaresCubes page hidden">
        <p>Squares and Cubes</p>
        <div class="skill-generator-container squaresCubes-generator-container"></div>
        <input class="skill-search-bar squaresCubes-search-bar" placeholder="Enter">
        <button class="skill-start-button squaresCubes-start-button" onclick="
          swapStartStop('squaresCubes-start-button');
          squaresCubes();
          ">Start
        </button>
      </div>
      <div class="skillPage skills-decimalToFraction page hidden">
        <p>Decimal to Fraction</p>
        <div class="skill-generator-container decimalToFraction-generator-container"></div>
        <input class="skill-search-bar decimalToFraction-search-bar" placeholder="Enter">
        <button class="skill-start-button decimalToFraction-start-button" onclick="
          swapStartStop('decimalToFraction-start-button');
          decimalToFraction();
          ">Start
        </button>
      </div>
      <!-- #endregion -->

      <!-- #region Tricks Individual Pages-->
      <div class="trickPage tricks-cubicRootABC page hidden">
        <p>Cubic Root ([a+b][b+c][c+a])</p>
        <div class="trick-generator-container cubicRootABC-generator-container"></div>
        <input class="trick-search-bar cubicRootABC-search-bar" placeholder="Enter">
        <button class="trick-start-button cubicRootABC-start-button" onclick="
          swapStartStop('cubicRootABC-start-button');
          cubicRootABC();
          ">Start
        </button>
      </div>
      <div class="trickPage tricks-determinant3x3 page hidden">
        <p>Determinant of 3x3 Matrix</p>
        <div class="trick-generator-container determinant3x3-generator-container"></div>
        <input class="trick-search-bar determinant3x3-search-bar" placeholder="Enter">
        <button class="trick-start-button determinant3x3-start-button" onclick="
          swapStartStop('determinant3x3-start-button');
          determinant3x3();
          ">Start
        </button>
      </div>
      <div class="trickPage tricks-doubleIntegralAddSubtract page hidden">
        <p>Double Integral Add/Subtract</p>
        <div class="trick-generator-container doubleIntegralAddSubtract-generator-container"></div>
        <input class="trick-search-bar doubleIntegralAddSubtract-search-bar" placeholder="Enter">
        <button class="trick-start-button doubleIntegralAddSubtract-start-button" onclick="
          swapStartStop('doubleIntegralAddSubtract-start-button');
          doubleIntegralAddSubtract();
          ">Start
        </button>
      </div>
      <!-- #endregion -->
      
      <!-- #region Test Individual Pages -->
      <div class="testPage tests-questions-1-10 page hidden">
        <p>Questions 1-10</p>
        <div class="test-generator-container questions-1-10-generator-container"></div>
        <input class="test-search-bar questions-1-10-search-bar" placeholder="Enter">
        <button class="test-start-button questions-1-10-start-button" onclick="
          swapStartStop('questions-1-10-start-button');
          testMaker(1, 10, 'questions-1-10-generator-container', 'questions-1-10-search-bar', 'questions-1-10-start-button');
          ">Start
      </div>
      <div class="testPage tests-questions-11-20 page hidden">
        <p>Questions 11-20</p>
      </div>
      <!-- #endregion -->
    </div>


    <script src="ns-practice-layout.js"></script>
    <script src="ns-practice-skills.js"></script>
    <script src="ns-practice-tricks.js"></script>
    <script src="ns-practice-test.js"></script>
  </body>
</html>
